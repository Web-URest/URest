name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # postinstall runs prisma generate — needs a syntactically valid URL only
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Dummy config so env.ts boot-validation passes during `next build`
          # page-data collection (the auth route imports env). Real values are
          # injected at runtime on Railway.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DATA_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          AUTH_SECRET: "ci-build-dummy-secret-at-least-32-characters"
          ADMIN_SESSION_SECRET: "ci-build-dummy-admin-secret-at-least-32-chars"
          LINE_CLIENT_ID: "ci-dummy"
          LINE_CLIENT_SECRET: "ci-dummy"
