name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # postinstall runs prisma generate — needs a syntactically valid URL only
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Enforce lib-only Booking state writes
        run: pnpm gate:status

      - name: Enforce no bodyRaw reads outside lib/messaging
        run: pnpm gate:bodyraw

      - name: Enforce lib-only Review / GuestRating writes
        run: pnpm gate:reviews

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Dummy config so env.ts boot-validation passes during `next build`
          # page-data collection (the auth route imports env). Real values are
          # injected at runtime on Railway.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DATA_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          AUTH_SECRET: "ci-build-dummy-secret-at-least-32-characters"
          ADMIN_SESSION_SECRET: "ci-build-dummy-admin-secret-at-least-32-chars"
          GOOGLE_CLIENT_ID: "ci-dummy"
          GOOGLE_CLIENT_SECRET: "ci-dummy"
          LINE_CLIENT_ID: "ci-dummy"
          LINE_CLIENT_SECRET: "ci-dummy"
          R2_ACCOUNT_ID: "ci-dummy"
          R2_ACCESS_KEY_ID: "ci-dummy"
          R2_SECRET_ACCESS_KEY: "ci-dummy"
          R2_PUBLIC_BUCKET: "ci-public"
          R2_PRIVATE_BUCKET: "ci-private"
          R2_PUBLIC_BASE_URL: "https://cdn.ci.example"
          OPN_PUBLIC_KEY: "pkey_test_ci_dummy"
          OPN_SECRET_KEY: "skey_test_ci_dummy"
